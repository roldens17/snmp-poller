name: snmp-saas-prod

services:
  api:
    build: .
    container_name: snmp-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      CONFIG_FILE: /config.yaml
      # Prefer managed Postgres DSN from .env.production
      POSTGRES_DSN: ${POSTGRES_DSN}
    volumes:
      - ./config.yaml:/config.yaml:ro
    expose:
      - "8080"
      - "9105"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    networks: [edge, internal]

  poller:
    build: .
    container_name: snmp-poller-worker
    restart: unless-stopped
    env_file: .env.production
    environment:
      CONFIG_FILE: /config.yaml
      POSTGRES_DSN: ${POSTGRES_DSN}
      RUN_MODE: poller
    command: ["/usr/local/bin/snmp-poller"]
    volumes:
      - ./config.yaml:/config.yaml:ro
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  web:
    build: ./web
    container_name: snmp-web
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    networks: [edge]

  redis:
    image: redis:7-alpine
    container_name: snmp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  nginx:
    image: nginx:alpine
    container_name: snmp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/snmp-saas.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    networks: [edge]

volumes:
  redis_data:

networks:
  edge:
  internal:

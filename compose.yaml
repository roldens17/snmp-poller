name: sasss

services:
  web:
    build: ./web
    depends_on:
      - snmp-poller
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: snmp
      POSTGRES_PASSWORD: snmp
      POSTGRES_DB: snmp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snmp -d snmp"]
      interval: 5s
      timeout: 3s
      retries: 20

  snmp-poller:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
      - "9105:9105"
    volumes:
      - ./config.yaml:/config.yaml:ro
    environment:
      CONFIG_FILE: /config.yaml
      AUTH_ALLOW_REGISTER: "false"
      AUTH_JWT_SECRET: "dev-super-secret-change-me"
      DEMO_MODE: "true"


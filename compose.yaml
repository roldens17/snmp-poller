name: snmp-saas

services:
  web:
    build: ./web
    depends_on:
      - snmp-poller
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-snmp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_now}
      POSTGRES_DB: ${POSTGRES_DB:-snmp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snmp} -d ${POSTGRES_DB:-snmp}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  snmp-poller:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
      - "9105:9105"
    volumes:
      - ./config.yaml:/config.yaml:ro
    environment:
      CONFIG_FILE: /config.yaml
      POSTGRES_DSN: postgres://${POSTGRES_USER:-snmp}:${POSTGRES_PASSWORD:-change_me_now}@postgres:5432/${POSTGRES_DB:-snmp}?sslmode=disable
      AUTH_ALLOW_REGISTER: ${AUTH_ALLOW_REGISTER:-false}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-replace_me_with_long_random_secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_HTTP_ONLY: ${AUTH_COOKIE_HTTP_ONLY:-true}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      DEMO_MODE: ${DEMO_MODE:-false}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-replace_me_with_base64_32_byte_key}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    restart: unless-stopped

volumes:
  pgdata:

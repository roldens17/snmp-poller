name: sasss
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: snmp
      POSTGRES_PASSWORD: snmp
      POSTGRES_DB: snmp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snmp -d snmp"]
      interval: 5s
      timeout: 3s
      retries: 20

  snmp-poller:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: sasssbuild
    working_dir: /
    volumes:
      - ./config.yaml:/config.yaml
    command: ["/usr/local/bin/snmp-poller", "-config", "/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9105:9105"

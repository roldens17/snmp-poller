poll_interval: 1m
worker_count: 2

http:
  addr: ":8080"

postgres:
  dsn: postgres://snmp:snmp@postgres:5432/snmp?sslmode=disable
  max_conns: 10

snmp_defaults:
  community: public
  version: "2c"
  port: 161
  timeout: 5s
  retries: 2

switches:
  - name: eve-router
    address: 192.168.100.57
    community: public
    port: 161
    enabled: true
    site: lab
    description: "EVE-NG Cisco router"
  - name: Chatgpt_thebest
    address: 192.168.100.58
    community: public
    enabled: true
    site: lab
    description: "Chatgpt_thebest"

metrics:
  enabled: true
  addr: ":9105"
